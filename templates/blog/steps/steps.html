<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Steps – Staircase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@700;800&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; }

    .canvas {
      width: 1200px;
      height: 880px;
      background: #111827;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: calc(1200px - 96px);
      height: calc(880px - 96px);
      border-radius: 20px;
      padding: 48px;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 40px;
      position: relative;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: #fff;
      margin-bottom: 32px;
    }

    .title {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 800;
      font-size: 48px;
      color: #fff;
      line-height: 1.1;
    }

    .staircase {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 10px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 56px;
      background: #5B35D5;
      border-radius: 28px;
      padding: 0 20px 0 8px;
    }

    .step-num {
      width: 40px;
      height: 40px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
      font-size: 14px;
      color: #111827;
      flex-shrink: 0;
    }

    .step-label {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: #fff;
      white-space: nowrap;
    }

    .step-1 { width: 420px; }
    .step-2 { width: 380px; }
    .step-3 { width: 340px; }
    .step-4 { width: 300px; }
    .step-5 { width: 260px; }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="card">
      <div class="left">
        <span class="logo">facilio</span>
        <div class="title">RCM 7-Step Process</div>
      </div>
      <div class="staircase">
        <div class="step step-1">
          <div class="step-num">1</div>
          <span class="step-label">Selecting The Asset</span>
        </div>
        <div class="step step-2">
          <div class="step-num">2</div>
          <span class="step-label">Defining Functions</span>
        </div>
        <div class="step step-3">
          <div class="step-num">3</div>
          <span class="step-label">Identifying Failures</span>
        </div>
        <div class="step step-4">
          <div class="step-num">4</div>
          <span class="step-label">Analyzing Causes</span>
        </div>
        <div class="step step-5">
          <div class="step-num">5</div>
          <span class="step-label">Selecting Tasks</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
