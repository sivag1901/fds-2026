<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Stacked Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@700;800&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; }

    .canvas {
      width: 1200px;
      height: 880px;
      background: #111827;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 48px 40px;
    }

    .logo {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: #fff;
      margin-bottom: 16px;
    }

    .title {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 800;
      font-size: 40px;
      color: #fff;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 36px;
      max-width: 800px;
    }

    .grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 12px;
      flex: 1;
    }

    .card {
      background: #1E2B3D;
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .icon-circle {
      width: 56px;
      height: 56px;
      background: #5B35D5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
      flex-shrink: 0;
    }

    .card-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #fff;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <span class="logo">facilio</span>
    <div class="title">Top AI Use Cases in Facility Management 2025</div>
    <div class="grid">
      <div class="card">
        <div class="icon-circle">⚙</div>
        <div class="card-label">Predictive Maintenance</div>
      </div>
      <div class="card">
        <div class="icon-circle">⚙</div>
        <div class="card-label">Energy Optimization</div>
      </div>
      <div class="card">
        <div class="icon-circle">⚙</div>
        <div class="card-label">Space Planning</div>
      </div>
      <div class="card">
        <div class="icon-circle">⚙</div>
        <div class="card-label">Asset Tracking</div>
      </div>
      <div class="card">
        <div class="icon-circle">⚙</div>
        <div class="card-label">Compliance Monitoring</div>
      </div>
      <div class="card">
        <div class="icon-circle">⚙</div>
        <div class="card-label">Vendor Management</div>
      </div>
      <div class="card">
        <div class="icon-circle">⚙</div>
        <div class="card-label">Work Order Automation</div>
      </div>
      <div class="card">
        <div class="icon-circle">⚙</div>
        <div class="card-label">Sustainability Tracking</div>
      </div>
    </div>
  </div>
</body>
</html>
