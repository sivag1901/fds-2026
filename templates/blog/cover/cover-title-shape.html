<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Cover – Title + Shape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@700;800&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; }

    .canvas {
      width: 1200px;
      height: 630px;
      background: #5B35D5;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: calc(1200px - 64px);
      height: calc(630px - 64px);
      background: #5B35D5;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      padding: 16px;
      gap: 16px;
    }

    .left-panel {
      width: 490px;
      flex-shrink: 0;
      background: #E2E5EE;
      border-radius: 16px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .logo {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: #111827;
    }

    .title {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 800;
      font-size: 36px;
      color: #111827;
      line-height: 1.15;
      margin-top: auto;
      margin-bottom: 40px;
    }

    .orb {
      width: 60px;
      height: 60px;
      background: #111827;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      align-self: flex-start;
    }
    .orb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 6px,
        rgba(255,255,255,0.15) 6px,
        rgba(255,255,255,0.15) 7px
      );
    }

    .right-panel {
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      background: #BCC3CF;
      position: relative;
    }

    .right-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #BCC3CF 0%, #A8B0BE 100%);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="card">
      <div class="left-panel">
        <span class="logo">facilio</span>
        <div class="title">Your Blog Post Title Goes Here</div>
        <div class="orb"></div>
      </div>
      <div class="right-panel"></div>
    </div>
  </div>
</body>
</html>
