<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Cover – Bullet Points</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@700;800&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; }

    .canvas {
      width: 1200px;
      height: 630px;
      background: #5B35D5;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: calc(1200px - 64px);
      height: calc(630px - 64px);
      background: #5B35D5;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      padding: 16px;
      gap: 16px;
    }

    .left-panel {
      width: 490px;
      flex-shrink: 0;
      background: #E2E5EE;
      border-radius: 16px;
      padding: 40px;
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: #111827;
      margin-bottom: 24px;
    }

    .title {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 800;
      font-size: 28px;
      color: #111827;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #62748E;
      margin-bottom: 24px;
    }

    .bullets {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: auto;
    }

    .bullet-item {
      padding: 12px 0;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: #314158;
      border-bottom: 1px solid #C8CDD8;
    }

    .bullet-item:first-child {
      border-top: 1px solid #C8CDD8;
    }

    .right-panel {
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      background: #BCC3CF;
      position: relative;
    }

    .right-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #BCC3CF 0%, #A8B0BE 100%);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="card">
      <div class="left-panel">
        <span class="logo">facilio</span>
        <div class="title">Your Blog Post Title Goes Here</div>
        <div class="subtitle">The secret recipe to operational efficiency</div>
        <div class="bullets">
          <div class="bullet-item">Plan-Do-Study-Act</div>
          <div class="bullet-item">Plan-Do-Study-Act</div>
          <div class="bullet-item">Plan-Do-Study-Act</div>
        </div>
      </div>
      <div class="right-panel"></div>
    </div>
  </div>
</body>
</html>
