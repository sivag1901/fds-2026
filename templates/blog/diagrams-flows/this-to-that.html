<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>This to That</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@700;800&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; }

    .canvas {
      width: 1200px;
      height: 880px;
      background: #111827;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: calc(1200px - 48px);
      height: calc(880px - 48px);
      background: #1E2638;
      border-radius: 20px;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: #fff;
      margin-bottom: 16px;
    }

    .title {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 800;
      font-size: 36px;
      color: #fff;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 48px;
    }

    .rows {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .from-cell {
      flex: 1;
      background: #E2E5EE;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .from-text {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: #111827;
      text-align: center;
    }

    .arrow-cell {
      width: 56px;
      height: 56px;
      background: #5B35D5;
      border-radius: 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
    }

    .to-cell {
      flex: 1;
      background: #E2E5EE;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .to-text {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #314158;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="card">
      <span class="logo">facilio</span>
      <div class="title">Top AI Use Cases in Facility Management 2025</div>
      <div class="rows">
        <div class="row">
          <div class="from-cell"><span class="from-text">De minimis safe harbor</span></div>
          <div class="arrow-cell">→</div>
          <div class="to-cell"><span class="to-text">Small tools &amp; parts ($2,500/$5,000 threshold)</span></div>
        </div>
        <div class="row">
          <div class="from-cell"><span class="from-text">Routine maintenance</span></div>
          <div class="arrow-cell">→</div>
          <div class="to-cell"><span class="to-text">Scheduled work keeping property in normal operating condition</span></div>
        </div>
        <div class="row">
          <div class="from-cell"><span class="from-text">Capital improvement</span></div>
          <div class="arrow-cell">→</div>
          <div class="to-cell"><span class="to-text">Betterments, restorations, or adaptations to a unit of property</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
