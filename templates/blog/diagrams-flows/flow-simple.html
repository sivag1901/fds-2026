<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Flow Simple</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@700;800&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; }

    .canvas {
      width: 1200px;
      height: 880px;
      background: #D0D4E0;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dark-card {
      width: calc(1200px - 48px);
      height: calc(880px - 48px);
      background: #111827;
      border-radius: 20px;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: #fff;
      margin-bottom: 16px;
    }

    .title {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 800;
      font-size: 36px;
      color: #fff;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 48px;
    }

    .flow-section {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .arcs-svg {
      width: 100%;
      height: 60px;
    }

    .nodes-row {
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      gap: 24px;
      margin-top: 8px;
    }

    .node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .node-circle {
      width: 56px;
      height: 56px;
      background: #5B35D5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #fff;
    }

    .node-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #fff;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="dark-card">
      <span class="logo">facilio</span>
      <div class="title">Top AI Use Cases in Facility Management 2025</div>
      <div class="flow-section">
        <svg class="arcs-svg" viewBox="0 0 900 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M112,60 Q112,10 225,10 Q338,10 338,60" stroke="#5B35D5" stroke-width="1.5" fill="none"/>
          <path d="M338,60 Q338,10 451,10 Q564,10 564,60" stroke="#5B35D5" stroke-width="1.5" fill="none"/>
          <path d="M564,60 Q564,10 677,10 Q790,10 790,60" stroke="#5B35D5" stroke-width="1.5" fill="none"/>
        </svg>
        <div class="nodes-row">
          <div class="node">
            <div class="node-circle">🛒</div>
            <div class="node-label">Procurement</div>
          </div>
          <div class="node">
            <div class="node-circle">🛒</div>
            <div class="node-label">Processing</div>
          </div>
          <div class="node">
            <div class="node-circle">🛒</div>
            <div class="node-label">Delivery</div>
          </div>
          <div class="node">
            <div class="node-circle">🛒</div>
            <div class="node-label">Completion</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
