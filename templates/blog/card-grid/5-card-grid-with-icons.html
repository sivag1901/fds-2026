<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>5-Card Grid with Icons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@700;800&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; }

    .canvas {
      width: 1200px;
      height: 880px;
      background: #111827;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .outer-container {
      width: calc(1200px - 40px);
      height: calc(880px - 40px);
      background: #E2E5EE;
      border-radius: 20px;
      padding: 16px;
      display: flex;
    }

    .grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 10px;
    }

    .info-card {
      background: #D0D4DD;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hero-card {
      grid-column: 1;
      grid-row: 1 / 3;
      background: #D0D4DD;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: #111827;
      margin-bottom: 24px;
    }

    .hero-title {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 700;
      font-size: 28px;
      color: #111827;
      line-height: 1.2;
    }

    .icon {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 22px;
      color: #5B35D5;
      line-height: 1;
    }

    .stat-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: #314158;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="outer-container">
      <div class="grid">
        <div class="hero-card">
          <span class="logo">facilio</span>
          <div class="hero-title">Key Metrics Improved by Asset Tracking Systems in Hospitals</div>
        </div>
        <div class="info-card">
          <div class="icon">↑↑</div>
          <div class="stat-label">Increase in Audit Preparation Time</div>
        </div>
        <div class="info-card">
          <div class="icon">↑↑</div>
          <div class="stat-label">Reduction in Asset Loss Rate</div>
        </div>
        <div class="info-card">
          <div class="icon">↑↑</div>
          <div class="stat-label">Improvement in Equipment Utilization</div>
        </div>
        <div class="info-card">
          <div class="icon">↑↑</div>
          <div class="stat-label">Faster Maintenance Response Time</div>
        </div>
        <div class="info-card">
          <div class="icon">↑↑</div>
          <div class="stat-label">Decrease in Total Maintenance Costs</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
