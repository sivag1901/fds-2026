<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>4 Grids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@700;800&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; }

    .canvas {
      width: 1200px;
      height: 880px;
      background: #5B35D5;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 48px 40px;
    }

    .logo {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: #fff;
      margin-bottom: 16px;
    }

    .title {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 800;
      font-size: 38px;
      color: #fff;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 32px;
      max-width: 800px;
    }

    .cards-container {
      width: 100%;
      flex: 1;
      background: #C8CCD6;
      border-radius: 20px;
      padding: 16px;
    }

    .grid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 12px;
    }

    .card {
      background: #E8EAF0;
      border-radius: 12px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
    }

    .check-icon {
      width: 32px;
      height: 32px;
      background: #16A34A;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .card-text {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 15px;
      color: #314158;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <span class="logo">facilio</span>
    <div class="title">Top AI Use Cases in Facility Management 2025</div>
    <div class="cards-container">
      <div class="grid">
        <div class="card">
          <div class="check-icon">✓</div>
          <div class="card-text">Lower energy bills by identifying waste and inefficiencies</div>
        </div>
        <div class="card">
          <div class="check-icon">✓</div>
          <div class="card-text">Prevent costly breakdowns with predictive maintenance alerts</div>
        </div>
        <div class="card">
          <div class="check-icon">✓</div>
          <div class="card-text">Improve space utilization with real-time occupancy data</div>
        </div>
        <div class="card">
          <div class="check-icon">✓</div>
          <div class="card-text">Automate compliance tracking and stay audit-ready always</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
