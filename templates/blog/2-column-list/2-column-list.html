<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>2-Column List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@700;800&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; }

    .canvas {
      width: 1200px;
      height: 880px;
      background: #111827;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      gap: 16px;
    }

    .left-panel {
      width: 380px;
      flex-shrink: 0;
      background: #E2E5EE;
      border-radius: 16px;
      padding: 40px;
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: #111827;
    }

    .left-title {
      font-family: 'Darker Grotesque', sans-serif;
      font-weight: 700;
      font-size: 32px;
      color: #111827;
      line-height: 1.2;
      margin-top: 24px;
      flex: 1;
    }

    .orb {
      width: 60px;
      height: 60px;
      background: #111827;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
    }
    .orb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 6px,
        rgba(255,255,255,0.15) 6px,
        rgba(255,255,255,0.15) 7px
      );
    }

    .right-panel {
      flex: 1;
      background: #E2E5EE;
      border-radius: 16px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 20px;
      flex: 1;
    }

    .list-item:not(:last-child) {
      border-bottom: 1px solid #D6DAE3;
      padding-bottom: 16px;
      margin-bottom: 16px;
    }

    .check-circle {
      width: 40px;
      height: 40px;
      background: #5B35D5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      flex-shrink: 0;
    }

    .item-text {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 15px;
      color: #314158;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="container">
      <div class="left-panel">
        <span class="logo">facilio</span>
        <div class="left-title">Top AI Use Cases in Facility Management 2025</div>
        <div class="orb"></div>
      </div>
      <div class="right-panel">
        <div class="list-item">
          <div class="check-circle">✓</div>
          <div class="item-text">Cuts downtime and stops surprises</div>
        </div>
        <div class="list-item">
          <div class="check-circle">✓</div>
          <div class="item-text">Reduces energy consumption across facilities</div>
        </div>
        <div class="list-item">
          <div class="check-circle">✓</div>
          <div class="item-text">Automates routine maintenance workflows</div>
        </div>
        <div class="list-item">
          <div class="check-circle">✓</div>
          <div class="item-text">Improves compliance and audit readiness</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
